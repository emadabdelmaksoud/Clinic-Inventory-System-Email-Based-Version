kind = "web"
previewPath = "/"
title = "AUC Clinic Inventory"
version = "1.0.0"
id = "artifacts/store-control"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25373

[services.development]
run = "pnpm --filter @workspace/store-control run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/store-control", "run", "build" ]
publicDir = "artifacts/store-control/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25373"
BASE_PATH = "/"
